<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tubo.img</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal">

<div class="terminal-header">
<span class="title">evidence@forensics:~/tubo.img</span>
</div>

<div class="filesystem">

<p class="prompt">$ ls /home/tubo/</p>

<div class="file" onclick="openFile('profile')">profile.txt</div>
<div class="file" onclick="openFile('contact')">contact.log</div>
<div class="file" onclick="openFile('org')">organizations/</div>
<div class="file" onclick="openFile('interest')">interests/</div>

</div>

<div id="viewer" class="hidden">

<p class="prompt">$ cat artifact</p>

<pre id="content"></pre>

<div class="meta">
<p class="prompt">$ stat artifact</p>
<pre id="metadata"></pre>
</div>

<button onclick="back()">← back</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
